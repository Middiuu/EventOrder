<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>EventOrder - Report</title>
  <script>(function(){try{var t=localStorage.getItem("eo-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
  <link rel="stylesheet" href="/app.css" />
</head>
<body class="page-report" data-page="report">
  <div class="app" id="app">
    <main class="main">
      <div class="page-head">
        <div class="eyebrow">Report</div>
        <h1>Andamento della serata</h1>
        <div class="sub">Numeri del giorno · export e backup.</div>
      </div>

      <section class="card">
        <div class="section-heading">
          <div>
            <div class="eyebrow">Export &amp; backup</div>
            <h2>Strumenti amministrativi</h2>
          </div>
          <p class="section-note">Nel CSV il campo “A” è incluso: il giorno successivo è calcolato come limite tecnico.</p>
        </div>
        <div class="report-controls">
          <label class="field">
            <span class="field-label">Da</span>
            <input id="fromDate" class="input" type="date" />
          </label>
          <label class="field">
            <span class="field-label">A (incluso)</span>
            <input id="toDate" class="input" type="date" />
          </label>
          <button class="btn btn-secondary" id="downloadCsvBtn" type="button">CSV per prodotto</button>
          <button class="btn btn-secondary" id="downloadTxCsvBtn" type="button">CSV transazioni</button>
        </div>
        <div class="actions" style="margin-top:14px">
          <a class="btn btn-primary btn-center" href="/api/reports/backup">Backup database</a>
        </div>
      </section>

      <div id="reportBox" class="stack" style="margin-top:18px"></div>

      <div id="toast" class="toast"></div>
    </main>
  </div>

  <script src="/vendor/chart.js/dist/chart.umd.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
