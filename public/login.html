<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>EventOrder - Accesso</title>
  <script src="/theme-init.js"></script>
  <link rel="stylesheet" href="/app.css" />
  <link rel="stylesheet" href="/fonts.css" />
</head>
<body class="page-login">
  <div class="center-shell">
    <section class="pin-card">
      <div class="brand-mark" id="brandMark">E</div>
      <h1>Inserisci il PIN</h1>
      <div class="sub" id="pinSub">Accesso protetto</div>

      <div class="pin-dots" id="pinDots" aria-hidden="true"></div>

      <div class="pinpad" id="pinpad">
        <button class="pin-key" type="button" data-k="1">1</button>
        <button class="pin-key" type="button" data-k="2">2</button>
        <button class="pin-key" type="button" data-k="3">3</button>
        <button class="pin-key" type="button" data-k="4">4</button>
        <button class="pin-key" type="button" data-k="5">5</button>
        <button class="pin-key" type="button" data-k="6">6</button>
        <button class="pin-key" type="button" data-k="7">7</button>
        <button class="pin-key" type="button" data-k="8">8</button>
        <button class="pin-key" type="button" data-k="9">9</button>
        <button class="pin-key" type="button" data-k="clear">C</button>
        <button class="pin-key" type="button" data-k="0">0</button>
        <button class="pin-key" type="button" data-k="back">⌫</button>
      </div>

      <div class="login-error" id="loginError"></div>
      <div class="actions" style="margin-top:14px">
        <button class="btn btn-primary" id="enterBtn" type="button" style="flex:1">Entra</button>
      </div>
    </section>
  </div>

  <script src="/login.js"></script>
</body>
</html>
