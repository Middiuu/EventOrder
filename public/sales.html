<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>EventOrder - Vendite</title>
  <script src="/theme-init.js"></script>
  <link rel="stylesheet" href="/app.css" />
  <link rel="stylesheet" href="/fonts.css" />
</head>
<body class="page-vendite" data-page="vendite">
  <div class="app" id="app">
    <main class="main">
      <div class="page-head">
        <div class="eyebrow">Vendite</div>
        <h1>Storico vendite</h1>
        <div class="sub">Registro delle comande. Puoi annullare una vendita indicando il motivo.</div>
      </div>

      <section class="card">
        <div class="section-heading">
          <div>
            <div class="eyebrow">Filtri</div>
            <h2>Cerca nel registro</h2>
          </div>
          <button class="btn btn-secondary btn-compact" id="toggleSalesFilters" type="button" aria-expanded="false" aria-controls="advancedSalesFilters">Altri filtri</button>
        </div>
        <form id="salesFilters">
          <div class="sales-filter-primary">
            <label class="field">
              <span class="field-label">Numero</span>
              <input class="input mono" name="number" type="number" min="1" step="1" placeholder="Es. 42" />
            </label>
            <label class="field sales-product-search">
              <span class="field-label">Prodotto</span>
              <input class="input" name="product" minlength="3" placeholder="Almeno 3 caratteri" />
            </label>
            <button class="btn btn-primary" type="submit">Cerca</button>
          </div>
          <div class="sales-filter-advanced" id="advancedSalesFilters" hidden>
            <label class="field">
              <span class="field-label">Da</span>
              <input class="input" name="from" type="date" />
            </label>
            <label class="field">
              <span class="field-label">A (incluso)</span>
              <input class="input" name="to" type="date" />
            </label>
            <label class="field">
              <span class="field-label">Operatore</span>
              <input class="input" name="operator" placeholder="Nome operatore" />
            </label>
            <label class="field">
              <span class="field-label">Metodo</span>
              <select class="input" name="method">
                <option value="">Tutti</option>
                <option value="cash">Contanti</option>
                <option value="card">Carta</option>
                <option value="other">Altro</option>
              </select>
            </label>
            <label class="field">
              <span class="field-label">Stato</span>
              <select class="input" name="status">
                <option value="">Tutte</option>
                <option value="valid">Valide</option>
                <option value="voided">Annullate</option>
              </select>
            </label>
          </div>
          <div class="sales-filter-footer">
            <span class="small" id="salesFilterSummary">Nessun filtro avanzato</span>
            <button class="btn btn-ghost btn-compact" id="resetSalesFilters" type="button">Azzera filtri</button>
          </div>
        </form>
      </section>

      <section class="card" style="margin-top:18px">
        <div class="section-heading">
          <div>
            <div class="eyebrow">Registro</div>
            <h2 id="salesListTitle">Vendite recenti</h2>
          </div>
          <button class="btn btn-secondary btn-compact" id="refreshSalesBtn" type="button">Aggiorna</button>
        </div>
        <div id="salesList" class="stack"></div>
        <div class="sales-load-more">
          <button class="btn btn-secondary" id="loadMoreSalesBtn" type="button" hidden>Carica altre vendite</button>
        </div>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
