<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>EventOrder - Benvenuto</title>
  <script>(function(){try{var t=localStorage.getItem("eo-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
  <link rel="stylesheet" href="/app.css" />
</head>
<body class="page-welcome">
  <div class="center-shell">
    <section class="welcome">
      <div class="brand-mark" id="brandMark">E</div>
      <div class="eyebrow" id="brandEyebrow">EventOrder · Cassa locale</div>
      <h1 id="welcomeTitle">Benvenuto</h1>
      <p>Apri la cassa, tocca i prodotti, incassi e stampi il ticket.<br>Tutto in locale, in meno di un minuto.</p>
      <div class="welcome-chips">
        <span class="welcome-chip">Veloce al banco</span>
        <span class="welcome-chip">100% in locale</span>
        <span class="welcome-chip">Zero burocrazia</span>
      </div>
      <div class="actions" style="justify-content:center">
        <a class="btn btn-primary" href="/">Inizia il servizio →</a>
      </div>
      <div class="welcome-foot">Documento non fiscale · Nessun account · Licenza MIT</div>
    </section>
  </div>

  <script>
    (async function () {
      try {
        const cfg = await (await fetch("/api/config")).json();
        const name = cfg.businessName || cfg.appName || "EventOrder";
        document.querySelector("#welcomeTitle").textContent = "Benvenuto in " + name;
        document.querySelector("#brandMark").textContent = (cfg.appName?.trim()[0] || "E").toUpperCase();
        document.querySelector("#brandEyebrow").textContent = (cfg.appName || "EventOrder") + " · " + (cfg.tagline || "Cassa locale");
      } catch (e) {}
    })();
  </script>
</body>
</html>
